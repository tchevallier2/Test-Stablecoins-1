name: Update Stablecoin Market Data

# Runs daily at 6 AM UTC, or on demand via the GitHub Actions UI.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      # Set this once in GitHub → Settings → Variables → Actions → New variable
      # Name: GOOGLE_SHEET_ID
      # Value: the ID from your sheet URL:
      #   https://docs.google.com/spreadsheets/d/<GOOGLE_SHEET_ID>/edit
      #
      # The sheet must be published to the web (File → Share → Publish to web).
      # If not set, the Action falls back to patching only market caps in the
      # existing data.js (no metadata changes).
      GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest data (Sheets + CoinGecko) and regenerate data.js
        run: python scripts/update_market_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --cached --quiet || (
            git commit -m "chore: update stablecoin data $(date -u +'%Y-%m-%d')" &&
            git push
          )
